name: Deploy Hugo Site to Hostinger

on:
  push:
    branches:
      - main  # Change to master if your default branch is named master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: true  # Ensures your Hugo themes fetch correctly
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true    # Set to true if your theme requires Hugo Extended

      - name: Build Static Files
        run: hugo --minify

      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: ./domains/gautam-singh.com/public_html/
          protocol: ftps
          port: 21

