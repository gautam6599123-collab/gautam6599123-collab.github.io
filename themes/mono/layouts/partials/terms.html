{{- /*
For a given taxonomy, renders a list of terms assigned to the page.
*/}}

{{- $page := .page }}
{{- $taxonomy := .taxonomy }}

{{- with $page.GetTerms $taxonomy }}
  <div style="display: flex; align-items: baseline; gap: 0.75rem; flex-wrap: wrap; margin-top: 2.5rem; padding-top: 1rem; border-top: 1px dashed var(--border-color, #ccc); font-family: monospace; font-size: 0.85rem;">
    
    <span style="color: #666; text-transform: uppercase;">{{ (index . 0).Parent.LinkTitle }}:</span>
    
    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
      {{- range . }}
        <a href="{{ .RelPermalink }}" style="
            color: #551a8b; /* Your theme's purple link color */
            text-decoration: none; 
            border: 1px solid var(--border-color, #ccc); 
            padding: 0.1rem 0.5rem; 
            background: #f8f9fa;
        ">
          {{ .LinkTitle }}
        </a>
      {{- end }}
    </div>
    
  </div>
{{- end }}
